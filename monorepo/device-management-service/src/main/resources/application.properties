spring.application.name=device-management-service

### Database ###
spring.datasource.url=jdbc:postgresql://${POSTGRES_ADDR}:${POSTGRES_PORT}/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.jpa.hibernate.ddl-auto=update

### Logs ###
logging.level.root=${LOG_LEVEL}
logging.level.org.springframework=${LOG_LEVEL}
logging.level.org.springframework.web=${LOG_LEVEL}
logging.level.org.springframework.security=${LOG_LEVEL}
debug=${DEBUG_ENABLED}

### Keycloak base ###
keycloak.realm=${KEYCLOAK_REALM}
keycloak.base-url=http://${KEYCLOAK_ADDR}

### Authentication / Authorization ###
# issuer-uri is sufficient to find openid-configuration and get certs endpoint
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://${KEYCLOAK_ADDR}/realms/${KEYCLOAK_REALM}
keycloak.auth.client-id=${KEYCLOAK_AUTH_CLIENT_ID}

### Keycloak Service Account Access ###
keycloak.svc.client-id=${KEYCLOAK_SVC_CLIENT_ID}
keycloak.svc.client-secret=${KEYCLOAK_SVC_CLIENT_SECRET}

### Jobs ###
orphaned-homes.days-to-delete=7

### Redis ###
spring.cache.type=redis
spring.cache.host=${REDIS_ADDR}
spring.cache.port=${REDIS_PORT}
spring.cache.redis.time-to-live=60000
