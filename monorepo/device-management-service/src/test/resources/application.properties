spring.application.name=device-management-service-test

### Database ###
spring.datasource.url=jdbc:postgresql://localhost:5432/test
spring.datasource.username=test
spring.datasource.password=test
spring.jpa.hibernate.ddl-auto=create-drop

### Logs ###
logging.level.root=WARN
logging.level.org.springframework=WARN
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
debug=false

### Keycloak base ###
keycloak.realm=device-management
keycloak.base-url=http://localhost:8080

### Authentication / Authorization ###
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/device-management
keycloak.auth.client-id=device-management-service

### Keycloak Service Account Access ###
keycloak.svc.client-id=device-management-service
keycloak.svc.client-secret=test-secret

### Jobs ###
orphaned-homes.days-to-delete=7

### Redis ###
spring.cache.type=redis
spring.cache.host=localhost
spring.cache.port=6379
spring.cache.redis.time-to-live=60000